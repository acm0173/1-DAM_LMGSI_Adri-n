<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<html>
  <head>
    <title>Tabla de Videojuegos</title>
    <style>
          table {
          border-collapse: collapse;
          width: 60%;
          margin: 20px auto;
          box-shadow: 0px 0px 10px grey;
          }
          th {
          background-color: #159dcc;
          color: white;
          padding: 10px;
          border: 2px solid black;
          }
          td {
          padding: 10px;
          border: 2px solid black;
          text-align: center;
          }
        </style>
  </head>
  <body>
    <h2 style="text-align:center;">Catálogo de Videojuegos</h2>
    <table>
      <tr>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Puntuación</th>
      </tr>
      <tr>
        <td>The Legend of Zelda: Breath of the Wild</td>
        <td>59.99</td>
        <td>9.8</td>
      </tr>
      <tr>
        <td>God of War</td>
        <td>49.99</td>
        <td>9.5</td>
      </tr>
      <tr>
        <td>Hollow Knight</td>
        <td>14.99</td>
        <td>9.0</td>
      </tr>
      <tr>
        <td>FIFA 24</td>
        <td>69.99</td>
        <td>7.8</td>
      </tr>
      <tr>
        <td>Minecraft</td>
        <td>26.95</td>
        <td>9.2</td>
      </tr>
    </table>
  </body>
</html>
