<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<html>
  <head>
    <style>
          table{border:solid 2px black; box-shadow:10px 10px 10px grey;}
          th{color:white;background-color:#159dcc;}
          td{border:solid 2px black;}
        </style>
  </head>
  <body>
    <table>
      <th>Nombre</th>
      <th>Precio</th>
      <!-- xsl:sort sirve para ordenar el contenido de cada elemento de una forma u otra, en este caso al utilizar "data-type = number" order = descending" 
              de esta forma estamos diciendole al programa que ordene el contenido por numeros de manera descendiente -->
      <tr>
        <td>FIFA 24</td>
        <td>69.99</td>
      </tr>
      <!-- xsl:sort sirve para ordenar el contenido de cada elemento de una forma u otra, en este caso al utilizar "data-type = number" order = descending" 
              de esta forma estamos diciendole al programa que ordene el contenido por numeros de manera descendiente -->
      <tr>
        <td>The Legend of Zelda: Breath of the Wild</td>
        <td>59.99</td>
      </tr>
      <!-- xsl:sort sirve para ordenar el contenido de cada elemento de una forma u otra, en este caso al utilizar "data-type = number" order = descending" 
              de esta forma estamos diciendole al programa que ordene el contenido por numeros de manera descendiente -->
      <tr>
        <td>God of War</td>
        <td>49.99</td>
      </tr>
      <!-- xsl:sort sirve para ordenar el contenido de cada elemento de una forma u otra, en este caso al utilizar "data-type = number" order = descending" 
              de esta forma estamos diciendole al programa que ordene el contenido por numeros de manera descendiente -->
      <tr>
        <td>Minecraft</td>
        <td>26.95</td>
      </tr>
      <!-- xsl:sort sirve para ordenar el contenido de cada elemento de una forma u otra, en este caso al utilizar "data-type = number" order = descending" 
              de esta forma estamos diciendole al programa que ordene el contenido por numeros de manera descendiente -->
      <tr>
        <td>Hollow Knight</td>
        <td>14.99</td>
      </tr>
    </table>
  </body>
</html>
