<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<html>
  <head>
    <style>
          table{border:solid 2px black; box-shadow:10px 10px 10px grey;}
          th{color:white;background-color:#159dcc;}
          td{border:solid 2px black;}
          #barato{background-color:lightgreen;}   
          #caro{background-color:salmon;}          
        </style>
    <!-- Define el color salmón para los elementos con el ID "caro" -->
    <!-- Define el color verde claro para los elementos con el ID "barato" -->
  </head>
  <body>
    <table>
      <th>Nombre</th>
      <th>Precio</th>
      <!-- Dicho de una forma más coloquial, es como decirle a la condicional que haga lo mismo para cada elemento con el nombre "videojuego" 
            haciendo su transformación necesaria -->
      <!-- Esta instrucción se utiliza para recorrer de manera iterativa diversos nodos del documento origen y aplicarles la
            transformación necesaria. -->
      <tr><td>The Legend of Zelda: Breath of the Wild</td><!-- El bloque de (xsl:choose) es el que decide qué color aplicar basándose en el precio del videojuego -->xsl:comment&gt;

              <td>59.99</td></tr>
      <!-- Dicho de una forma más coloquial, es como decirle a la condicional que haga lo mismo para cada elemento con el nombre "videojuego" 
            haciendo su transformación necesaria -->
      <!-- Esta instrucción se utiliza para recorrer de manera iterativa diversos nodos del documento origen y aplicarles la
            transformación necesaria. -->
      <tr><td>God of War</td><!-- El bloque de (xsl:choose) es el que decide qué color aplicar basándose en el precio del videojuego -->xsl:comment&gt;

              <td>49.99</td></tr>
      <!-- Dicho de una forma más coloquial, es como decirle a la condicional que haga lo mismo para cada elemento con el nombre "videojuego" 
            haciendo su transformación necesaria -->
      <!-- Esta instrucción se utiliza para recorrer de manera iterativa diversos nodos del documento origen y aplicarles la
            transformación necesaria. -->
      <tr><td>Hollow Knight</td><!-- El bloque de (xsl:choose) es el que decide qué color aplicar basándose en el precio del videojuego -->xsl:comment&gt;

              <td id="barato">14.99</td><!-- Se ejecuta si el precio es menor a 20, al asignarle el id="barato" la celda cambiará a verde --></tr>
      <!-- Dicho de una forma más coloquial, es como decirle a la condicional que haga lo mismo para cada elemento con el nombre "videojuego" 
            haciendo su transformación necesaria -->
      <!-- Esta instrucción se utiliza para recorrer de manera iterativa diversos nodos del documento origen y aplicarles la
            transformación necesaria. -->
      <tr><td>FIFA 24</td><!-- El bloque de (xsl:choose) es el que decide qué color aplicar basándose en el precio del videojuego -->xsl:comment&gt;

              <td id="caro">69.99</td><!-- Se ejecuta si el precio es menor a 60, al asignarle el id="barato" la celda cambiará a rojo --></tr>
      <!-- Dicho de una forma más coloquial, es como decirle a la condicional que haga lo mismo para cada elemento con el nombre "videojuego" 
            haciendo su transformación necesaria -->
      <!-- Esta instrucción se utiliza para recorrer de manera iterativa diversos nodos del documento origen y aplicarles la
            transformación necesaria. -->
      <tr><td>Minecraft</td><!-- El bloque de (xsl:choose) es el que decide qué color aplicar basándose en el precio del videojuego -->xsl:comment&gt;

              <td>26.95</td></tr>
    </table>
  </body>
</html>
