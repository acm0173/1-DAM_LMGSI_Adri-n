<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Dados</title>
    <style>
        * {
            font-family: Verdana;
        }

        h1 {
            padding: 5px;
            width: 325px;
            border: solid 2px black;
            box-shadow: 10px 10px 10px grey;
        }

        div {
            padding-left: 20px;
            width: 300px;
            border: solid 2px black;
            box-shadow: 10px 10px 10px grey;
            border-radius: 15px;
            background-color: #C6E3E6;
        }

        table,
        td,
        th {
            border: solid 1px black;
            border-collapse: collapse;
            padding: 3px;
        }

        th {
            background-color: #C6E3E6;
        }

        td {
            text-align: center;
        }

        table {
            margin-left: 75px;
            box-shadow: 10px 10px 10px grey;
        }
    </style>
    <script>
        var dado1, dado2;
        var punt1 = 0;
        var punt2 = 0;
        document.write("<h1>Partida de DADOS</h1>")
        document.write("<table><tr><th>Jugador1</th>" +
            "<th>Jugador2</th></tr>")
    </script>

    <script>
        for (i = 1; i <= 10; i++) {
            document.write("<tr>");
            dado1 = Math.floor(Math.random() * (7 - 1)) + 1;
            dado2 = Math.floor(Math.random() * (7 - 1)) + 1;
            document.write("<td>" + dado1 + "</td>");
            document.write("<td>" + dado2 + "</td>");
            document.write("</tr>");
            if (dado1 > dado2) {
                punt1 = punt1 + 1;
            }
            else if (dado1 < dado2) {
                punt2 = punt2 + 1;
            }
        }

        document.write("</table>");
        document.write("<br>");
        document.write("<h2>Puntuación total</h2>");
        document.write("JUGADOR 1: " + punt1 + " puntos.<br>");
        document.write("JUGADOR 2: " + punt2 + " puntos.");

        if (punt1 > punt2) {
            document.write("<h2>Jugador 1 gana</h2>");
        }
        else {
            if (punt1 == punt2) {
                document.write("<h2>EMPATE</h2>");
            }
            else {
                document.write("<h2>Jugador 2 gana</h2>");
            }
        }

        document.write("</div>");
    </script>
    </body>

</html>
