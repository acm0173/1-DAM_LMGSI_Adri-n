<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <p id="texto"> Texto de ejmplo </p>
    <button onclick="changeColor('Red')"> Rojo </button>
    <button onclick="changeColor('Blue')"> Azul </button>

    <script>
        function changeColor(colorNuevo) {
            var parrafo = document.getElementById("texto");
            parrafo.style.color = colorNuevo;
            parrafo.style.fontSize = "50px";
        }






    </script>


</body>

</html>
