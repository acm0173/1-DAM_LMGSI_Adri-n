<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 13</title>
</head>
<body>
    <!-- Generamos un array con opciones, del 0 al 3 "1 - X - 2", después creamos un bucle con los numeros de la quiniela en total
     14, acto seguido -->
        <script>
            var opciones = ["1", "X", "2"];

            for(i=1; i<=14; i++){
                var num = Math.floor(Math.random()* opciones.length);
                document.write("Resultado: " + i + ": " + opciones[num] + "<br>");
            }
        </script>
    
</body>
</html>
